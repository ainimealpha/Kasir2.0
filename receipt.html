<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DoJajann - Nota</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0a0a; --surface: #141414; --surface-elevated: #1a1a1a;
            --border: #2a2a2a; --orange: #ff6b35; --text: #ffffff;
            --text-secondary: #a0a0a0; --success: #22c55e;
            --paper: #ffffff; --paper-dark: #f5f5f5;
        }
        body {
            font-family: 'Inter', sans-serif; background: var(--bg);
            color: var(--text); min-height: 100vh;
        }
        .header {
            background: var(--surface); border-bottom: 1px solid var(--border);
            padding: 16px 20px; position: sticky; top: 0; z-index: 100;
        }
        .header-content {
            display: flex; align-items: center; gap: 16px;
        }
        .back-btn {
            background: var(--surface-elevated); border: 1px solid var(--border);
            color: var(--text); width: 40px; height: 40px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 20px;
        }
        .header-title { font-size: 18px; font-weight: 700; }

        .receipt-container {
            padding: 20px; display: flex; flex-direction: column;
            align-items: center; padding-bottom: 140px;
        }

        /* Modern Receipt Card */
        #receipt {
            background: var(--paper); width: 100%; max-width: 400px;
            border-radius: 24px; overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        /* Receipt Header - Dark */
        .receipt-header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white; padding: 32px 24px; text-align: center;
            position: relative;
        }
        .receipt-header::after {
            content: ''; position: absolute; bottom: -20px; left: 0; right: 0;
            height: 40px; background: var(--paper);
            border-radius: 24px 24px 0 0;
        }
        .receipt-brand {
            font-size: 32px; font-weight: 800; letter-spacing: -1px;
            margin-bottom: 8px;
        }
        .receipt-brand span { color: var(--orange); }
        .receipt-tagline {
            font-size: 12px; color: rgba(255,255,255,0.7);
            letter-spacing: 2px; text-transform: uppercase;
        }

        /* Receipt Body */
        .receipt-body {
            padding: 24px; padding-top: 8px; font-family: 'Space Mono', monospace;
            color: #1a1a1a;
        }

        /* Ticket Notch Effect */
        .ticket-notch {
            display: flex; justify-content: space-between;
            margin: 0 -24px; padding: 0 24px;
        }
        .notch {
            width: 24px; height: 24px; background: var(--bg);
            border-radius: 50%; margin-top: -12px;
        }

        /* Info Section */
        .info-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 12px; margin-bottom: 20px; padding: 16px;
            background: var(--paper-dark); border-radius: 12px;
        }
        .info-item { display: flex; flex-direction: column; gap: 4px; }
        .info-label { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 0.5px; }
        .info-value { font-size: 13px; font-weight: 700; color: #1a1a1a; }
        .info-item.full-width { grid-column: 1 / -1; }

        /* Items Table */
        .items-title {
            font-size: 12px; font-weight: 700; color: #666;
            text-transform: uppercase; letter-spacing: 1px;
            margin-bottom: 12px; padding-bottom: 8px;
            border-bottom: 2px dashed #ddd;
        }
        .item-row {
            display: flex; justify-content: space-between; align-items: flex-start;
            padding: 12px 0; border-bottom: 1px solid #eee;
        }
        .item-info { flex: 1; }
        .item-name {
            font-size: 14px; font-weight: 600; color: #1a1a1a;
            margin-bottom: 4px; display: flex; align-items: center; gap: 8px;
        }
        .item-emoji { font-size: 18px; }
        .item-detail {
            font-size: 12px; color: #666;
            display: flex; gap: 12px;
        }
        .item-total {
            font-size: 14px; font-weight: 700; color: #1a1a1a;
            text-align: right;
        }

        /* Totals Section */
        .totals-section {
            margin-top: 20px; padding-top: 16px;
            border-top: 2px dashed #ddd;
        }
        .total-row {
            display: flex; justify-content: space-between;
            padding: 6px 0; font-size: 13px; color: #666;
        }
        .total-row.discount { color: var(--success); }
        .total-row.grand {
            font-size: 18px; font-weight: 800; color: #1a1a1a;
            padding-top: 12px; margin-top: 8px;
            border-top: 2px solid #1a1a1a;
        }

        /* QRIS Section - Modern */
        .qris-section {
            margin-top: 24px; padding: 24px;
            background: var(--paper-dark); border-radius: 16px;
            text-align: center;
        }
        .qris-label {
            font-size: 11px; color: #666; letter-spacing: 2px;
            text-transform: uppercase; margin-bottom: 16px;
        }
        .qris-code {
            width: 180px; height: 180px; margin: 0 auto;
            background: white; border-radius: 16px;
            padding: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            display: flex; align-items: center; justify-content: center;
        }
        .qris-code svg { width: 100%; height: 100%; }
        .qris-note {
            margin-top: 12px; font-size: 12px; color: #888;
        }

        /* Footer */
        .receipt-footer {
            text-align: center; padding: 24px; padding-top: 0;
        }
        .thank-you {
            font-size: 16px; font-weight: 700; color: #1a1a1a;
            margin-bottom: 8px;
        }
        .footer-text {
            font-size: 11px; color: #888; line-height: 1.6;
        }
        .barcode-section {
            margin-top: 20px; padding: 16px;
            background: var(--paper-dark); border-radius: 12px;
        }
        .barcode {
            display: flex; justify-content: center; gap: 2px;
            height: 50px; align-items: flex-end;
        }
        .barcode-bar {
            background: #1a1a1a; border-radius: 1px;
        }
        .barcode-number {
            margin-top: 8px; font-size: 12px; letter-spacing: 4px;
            color: #666;
        }

        /* Bottom Bar */
        .bottom-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--surface); border-top: 1px solid var(--border);
            padding: 16px 20px; padding-bottom: calc(16px + env(safe-area-inset-bottom));
            display: flex; gap: 12px; z-index: 50;
        }
        .btn {
            flex: 1; border: none; border-radius: 16px;
            padding: 16px 24px; font-size: 16px; font-weight: 700;
            cursor: pointer; display: flex; align-items: center;
            justify-content: center; gap: 8px;
        }
        .btn-secondary {
            background: var(--surface-elevated); color: var(--text);
            border: 1px solid var(--border);
        }
        .btn-primary { background: var(--orange); color: white; }

        .new-order-btn {
            margin-top: 20px; background: transparent;
            border: 2px solid var(--border); color: var(--text-secondary);
            padding: 14px 24px; border-radius: 12px;
            font-size: 14px; font-weight: 600; cursor: pointer;
        }

        .toast {
            position: fixed; bottom: 100px; left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--success); color: white;
            padding: 14px 24px; border-radius: 12px;
            font-size: 14px; font-weight: 600; z-index: 300;
            opacity: 0; transition: all 0.3s;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        .loading-overlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.8);
            display: flex; align-items: center; justify-content: center;
            z-index: 400; opacity: 0; visibility: hidden; transition: all 0.3s;
        }
        .loading-overlay.show { opacity: 1; visibility: visible; }
        .loading-spinner {
            width: 48px; height: 48px; border: 4px solid var(--border);
            border-top-color: var(--orange); border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <button class="back-btn" onclick="goBack()">←</button>
            <div class="header-title">Nota Pembayaran</div>
        </div>
    </header>

    <div class="receipt-container">
        <div id="receipt">
            <!-- Header -->
            <div class="receipt-header">
                <div class="receipt-brand">Do<span>Jajann</span></div>
                <div class="receipt-tagline">Kasir Digital</div>
            </div>

            <div class="receipt-body">
                <!-- Ticket Notch -->
                <div class="ticket-notch">
                    <div class="notch"></div>
                    <div class="notch"></div>
                    <div class="notch"></div>
                    <div class="notch"></div>
                    <div class="notch"></div>
                    <div class="notch"></div>
                    <div class="notch"></div>
                    <div class="notch"></div>
                    <div class="notch"></div>
                    <div class="notch"></div>
                </div>

                <!-- Info -->
                <div class="info-grid">
                    <div class="info-item">
                        <span class="info-label">No. Nota</span>
                        <span class="info-value" id="nota-number">-</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Tanggal</span>
                        <span class="info-value" id="receipt-date">-</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Waktu</span>
                        <span class="info-value" id="receipt-time">-</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Tipe</span>
                        <span class="info-value" id="receipt-type">-</span>
                    </div>
                    <div class="info-item full-width" id="customer-info" style="display: none;">
                        <span class="info-label">Pelanggan</span>
                        <span class="info-value" id="receipt-customer">-</span>
                    </div>
                </div>

                <!-- Items -->
                <div class="items-title">Detail Pesanan</div>
                <div id="receipt-items"></div>

                <!-- Totals -->
                <div class="totals-section">
                    <div class="total-row">
                        <span>Subtotal</span>
                        <span id="receipt-subtotal">Rp 0</span>
                    </div>
                    <div class="total-row discount" id="receipt-discount-row" style="display: none;">
                        <span>Diskon</span>
                        <span id="receipt-discount">- Rp 0</span>
                    </div>
                    <div class="total-row grand">
                        <span>TOTAL</span>
                        <span id="receipt-total">Rp 0</span>
                    </div>
                </div>

                <!-- QRIS -->
                <div class="qris-section">
                    <div class="qris-label">Scan untuk pembayaran</div>
                    <div class="qris-code" id="qris-container">
                        <!-- QRIS SVG akan di-generate -->
                    </div>
                    <div class="qris-note">Dukungan pembayaran digital</div>
                </div>

                <!-- Barcode -->
                <div class="barcode-section">
                    <div class="barcode" id="barcode"></div>
                    <div class="barcode-number" id="barcode-number"></div>
                </div>
            </div>

            <!-- Footer -->
            <div class="receipt-footer">
                <div class="thank-you">Terima Kasih!</div>
                <div class="footer-text">
                    Simpan struk ini sebagai bukti pembayaran<br>
                    DoJajann - Kasir Digital
                </div>
            </div>
        </div>

        <button class="new-order-btn" onclick="newOrder()">🔄 Buat Pesanan Baru</button>
    </div>

    <div class="bottom-bar">
        <button class="btn btn-secondary" onclick="goBack()">← Edit</button>
        <button class="btn btn-primary" onclick="downloadReceipt()">💾 Simpan</button>
    </div>

    <div class="toast" id="toast"></div>
    <div class="loading-overlay" id="loading">
        <div class="loading-spinner"></div>
    </div>

    <script>
        let cart = {}, settings = {}, summary = {};

        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            generateQRIS();
            generateBarcode();
        });

        function loadData() {
            const savedCart = localStorage.getItem('dojajann_cart');
            const savedSettings = localStorage.getItem('dojajann_settings');
            const savedSummary = localStorage.getItem('dojajann_summary');
            
            if (savedCart) cart = JSON.parse(savedCart);
            if (savedSettings) settings = JSON.parse(savedSettings);
            if (savedSummary) summary = JSON.parse(savedSummary);
            
            renderReceipt();
        }

        function renderReceipt() {
            const notaNum = generateNotaNumber();
            document.getElementById('nota-number').textContent = notaNum;
            document.getElementById('barcode-number').textContent = notaNum;

            document.getElementById('receipt-date').textContent = settings.date || '-';
            document.getElementById('receipt-time').textContent = settings.time || '-';
            document.getElementById('receipt-type').textContent = 
                `${settings.orderTypeEmoji || '🍽️'} ${settings.orderType || 'Dine In'}`;

            if (settings.customer) {
                document.getElementById('receipt-customer').textContent = settings.customer;
                document.getElementById('customer-info').style.display = 'flex';
            }

            const itemsContainer = document.getElementById('receipt-items');
            const items = Object.values(cart);
            
            itemsContainer.innerHTML = items.map(item => `
                <div class="item-row">
                    <div class="item-info">
                        <div class="item-name">
                            <span class="item-emoji">${item.emoji}</span>
                            ${item.name}
                        </div>
                        <div class="item-detail">
                            <span>${item.qty}x @ Rp ${formatPrice(item.price)}</span>
                        </div>
                    </div>
                    <div class="item-total">Rp ${formatPrice(item.price * item.qty)}</div>
                </div>
            `).join('');

            const subtotal = summary.subtotal || Object.values(cart).reduce((sum, item) => sum + (item.price * item.qty), 0);
            const discount = summary.discount || 0;
            const total = summary.total || (subtotal - discount);

            document.getElementById('receipt-subtotal').textContent = `Rp ${formatPrice(subtotal)}`;
            
            if (discount > 0) {
                document.getElementById('receipt-discount-row').style.display = 'flex';
                document.getElementById('receipt-discount').textContent = `- Rp ${formatPrice(discount)}`;
            }

            document.getElementById('receipt-total').textContent = `Rp ${formatPrice(total)}`;
        }

        function generateNotaNumber() {
            const date = new Date();
            const year = date.getFullYear().toString().slice(-2);
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const random = Math.floor(Math.random() * 9000) + 1000;
            return `DJ${year}${month}${day}-${random}`;
        }

        function generateQRIS() {
            const container = document.getElementById('qris-container');
            const total = summary.total || 0;
            
            // Generate QRIS-style pattern
            const size = 148;
            const cellSize = 4;
            const cells = size / cellSize;
            
            let svg = `<svg viewBox="0 0 ${size} ${size}" xmlns="http://www.w3.org/2000/svg">`;
            
            // Background
            svg += `<rect width="${size}" height="${size}" fill="white"/>`;
            
            // Finder patterns (corners)
            const patterns = [[0,0], [cells-7,0], [0,cells-7]];
            patterns.forEach(([px, py]) => {
                // Outer square
                for(let y=0; y<7; y++) {
                    for(let x=0; x<7; x++) {
                        if(y===0 || y===6 || x===0 || x===6 || (y>=2 && y<=4 && x>=2 && x<=4)) {
                            svg += `<rect x="${(px+x)*cellSize}" y="${(py+y)*cellSize}" width="${cellSize}" height="${cellSize}" fill="#1a1a1a"/>`;
                        }
                    }
                }
            });
            
            // Random data pattern
            const seed = total.toString();
            for(let y=7; y<cells-7; y++) {
                for(let x=7; x<cells; x++) {
                    const hash = Math.sin(x * 12.9898 + y * 78.233 + total) * 43758.5453;
                    if((hash - Math.floor(hash)) > 0.5) {
                        svg += `<rect x="${x*cellSize}" y="${y*cellSize}" width="${cellSize}" height="${cellSize}" fill="#1a1a1a"/>`;
                    }
                }
            }
            
            // Vertical timing pattern
            for(let y=7; y<cells-7; y++) {
                if(y % 2 === 0) {
                    svg += `<rect x="${6*cellSize}" y="${y*cellSize}" width="${cellSize}" height="${cellSize}" fill="#1a1a1a"/>`;
                }
            }
            
            svg += '</svg>';
            container.innerHTML = svg;
        }

        function generateBarcode() {
            const container = document.getElementById('barcode');
            const patterns = [3,5,2,7,4,6,3,5,8,2,4,6,3,7,5,2,6,4,8,3,5,7,2,4,6];
            
            container.innerHTML = patterns.map((h, i) => {
                const w = Math.random() > 0.6 ? 3 : 2;
                const height = 20 + (h * 3);
                return `<div class="barcode-bar" style="height:${height}px;width:${w}px;"></div>`;
            }).join('');
        }

        function formatPrice(price) {
            return price.toLocaleString('id-ID');
        }

        async function downloadReceipt() {
            const loading = document.getElementById('loading');
            const receipt = document.getElementById('receipt');
            
            try {
                loading.classList.add('show');
                await document.fonts.ready;
                
                const canvas = await html2canvas(receipt, {
                    scale: 3,
                    backgroundColor: '#ffffff',
                    useCORS: true,
                    logging: false,
                    windowWidth: receipt.scrollWidth,
                    windowHeight: receipt.scrollHeight
                });
                
                const link = document.createElement('a');
                const notaNum = document.getElementById('nota-number').textContent;
                link.download = `DoJajann_${notaNum}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
                
                showToast('✅ Nota berhasil disimpan!');
            } catch (error) {
                console.error(error);
                showToast('❌ Gagal menyimpan');
            } finally {
                loading.classList.remove('show');
            }
        }

        function newOrder() {
            localStorage.removeItem('dojajann_cart');
            localStorage.removeItem('dojajann_summary');
            window.location.href = 'index.html';
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function goBack() {
            window.location.href = 'cart.html';
        }
    </script>
</body>
</html>
