<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DoJajann - Pilih Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0a0a; --surface: #141414; --surface-elevated: #1a1a1a;
            --border: #2a2a2a; --orange: #ff6b35; --orange-light: #ff8c5a;
            --text: #ffffff; --text-secondary: #a0a0a0; --success: #22c55e;
            --danger: #ef4444;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg); color: var(--text); min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        .header {
            background: var(--surface); border-bottom: 1px solid var(--border);
            padding: 16px 20px; position: sticky; top: 0; z-index: 100;
        }
        .header-content {
            display: flex; align-items: center; justify-content: space-between;
        }
        .logo { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
        .logo span { color: var(--orange); }
        .header-actions { display: flex; gap: 8px; }
        .icon-btn {
            background: var(--surface-elevated); border: 1px solid var(--border);
            color: var(--text); width: 44px; height: 44px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 20px; transition: all 0.2s;
        }
        .icon-btn:active { transform: scale(0.95); }
        .cart-btn {
            position: relative; background: var(--orange); border: none;
            color: white; padding: 0 16px; width: auto; font-size: 14px;
            font-weight: 600; gap: 6px;
        }
        .cart-count {
            position: absolute; top: -6px; right: -6px; background: white;
            color: var(--orange); font-size: 11px; font-weight: 700;
            width: 22px; height: 22px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }
        .settings-bar {
            background: var(--surface); padding: 16px 20px;
            display: flex; flex-direction: column; gap: 12px;
            border-bottom: 1px solid var(--border);
        }
        .input-group { display: flex; flex-direction: column; gap: 6px; }
        .input-label {
            font-size: 11px; font-weight: 600; color: var(--text-secondary);
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .input-field {
            background: var(--surface-elevated); border: 1px solid var(--border);
            color: var(--text); font-size: 15px; padding: 12px 16px;
            border-radius: 12px; outline: none; width: 100%;
        }
        .input-field:focus { border-color: var(--orange); }
        .datetime-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .order-type-btn {
            background: var(--surface-elevated); border: 1px solid var(--border);
            color: var(--text); padding: 14px 16px; border-radius: 12px;
            font-size: 14px; font-weight: 500; cursor: pointer;
            display: flex; align-items: center; justify-content: space-between;
        }
        .order-type-btn.active { background: var(--orange); border-color: var(--orange); }
        .section-title {
            font-size: 13px; font-weight: 700; color: var(--text-secondary);
            text-transform: uppercase; letter-spacing: 0.5px;
            padding: 20px; padding-bottom: 12px; display: flex;
            justify-content: space-between; align-items: center;
        }
        .add-menu-btn {
            background: var(--surface-elevated); border: 1px solid var(--border);
            color: var(--orange); padding: 8px 14px; border-radius: 10px;
            font-size: 13px; font-weight: 600; cursor: pointer;
        }
        .menu-grid {
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 12px; padding: 0 20px 20px;
        }
        .menu-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 20px; padding: 16px; cursor: pointer;
            transition: all 0.2s; position: relative;
        }
        .menu-card:active { transform: scale(0.96); }
        .menu-card.in-cart { border-color: var(--orange); }
        .menu-emoji { font-size: 40px; margin-bottom: 12px; display: block; }
        .menu-name {
            font-size: 14px; font-weight: 600; color: var(--text);
            margin-bottom: 6px; line-height: 1.3;
        }
        .menu-price {
            font-size: 15px; font-weight: 700; color: var(--orange);
        }
        .menu-qty-badge {
            position: absolute; top: 12px; right: 12px;
            background: var(--orange); color: white; font-size: 12px;
            font-weight: 700; width: 28px; height: 28px;
            border-radius: 50%; display: flex; align-items: center;
            justify-content: center; opacity: 0; transform: scale(0);
            transition: all 0.2s;
        }
        .menu-qty-badge.show { opacity: 1; transform: scale(1); }
        .menu-actions {
            position: absolute; top: 12px; left: 12px;
            display: flex; gap: 6px; 
            opacity: 1; /* UDAH DIBENERIN: Biar selalu kelihatan di HP, gak perlu hover */
            z-index: 10;
            transition: opacity 0.2s;
        }
        .menu-action-btn {
            width: 28px; height: 28px; border-radius: 8px;
            border: none; display: flex; align-items: center;
            justify-content: center; cursor: pointer; font-size: 14px;
        }
        .edit-btn { background: var(--surface-elevated); color: var(--text); }
        .delete-btn { background: var(--danger); color: white; }
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px); z-index: 200;
            opacity: 0; visibility: hidden; transition: all 0.3s;
        }
        .modal-overlay.show { opacity: 1; visibility: visible; }
        .modal {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--surface); border-radius: 24px 24px 0 0;
            z-index: 201; transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            max-height: 80vh; overflow-y: auto;
        }
        .modal.show { transform: translateY(0); }
        .modal-header {
            padding: 20px; border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
        }
        .modal-title { font-size: 18px; font-weight: 700; }
        .modal-close {
            background: var(--surface-elevated); border: none;
            color: var(--text); width: 36px; height: 36px;
            border-radius: 10px; display: flex; align-items: center;
            justify-content: center; cursor: pointer; font-size: 20px;
        }
        .modal-body { padding: 20px; }
        .form-group { margin-bottom: 16px; }
        .form-label {
            display: block; font-size: 12px; font-weight: 600;
            color: var(--text-secondary); margin-bottom: 8px;
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .form-input {
            width: 100%; background: var(--surface-elevated);
            border: 1px solid var(--border); color: var(--text);
            font-size: 16px; padding: 14px 16px; border-radius: 12px;
            outline: none;
        }
        .form-input:focus { border-color: var(--orange); }
        .emoji-grid {
            display: grid; grid-template-columns: repeat(6, 1fr);
            gap: 8px; margin-top: 8px;
        }
        .emoji-btn {
            aspect-ratio: 1; font-size: 28px; background: var(--surface-elevated);
            border: 2px solid transparent; border-radius: 12px;
            cursor: pointer; transition: all 0.2s;
        }
        .emoji-btn:hover { background: var(--border); }
        .emoji-btn.selected { border-color: var(--orange); background: rgba(255, 107, 53, 0.1); }
        .btn-submit {
            width: 100%; background: var(--orange); color: white;
            border: none; border-radius: 16px; padding: 16px;
            font-size: 16px; font-weight: 700; cursor: pointer;
            margin-top: 8px;
        }
        .btn-submit:active { transform: scale(0.98); }
        .order-option {
            display: flex; align-items: center; gap: 16px;
            padding: 16px; border-radius: 16px; cursor: pointer;
            transition: all 0.2s; margin-bottom: 8px;
        }
        .order-option:hover { background: var(--surface-elevated); }
        .order-option.selected { background: var(--orange); }
        .order-option-icon {
            width: 48px; height: 48px; background: var(--surface-elevated);
            border-radius: 14px; display: flex; align-items: center;
            justify-content: center; font-size: 24px;
        }
        .order-option.selected .order-option-icon { background: rgba(255, 255, 255, 0.2); }
        .order-option-text { flex: 1; }
        .order-option-title { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
        .order-option-desc { font-size: 13px; color: var(--text-secondary); }
        .order-option.selected .order-option-desc { color: rgba(255, 255, 255, 0.8); }
        .bottom-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--surface); border-top: 1px solid var(--border);
            padding: 16px 20px; padding-bottom: calc(16px + env(safe-area-inset-bottom));
            z-index: 50;
        }
        .btn-primary {
            width: 100%; background: var(--orange); color: white;
            border: none; border-radius: 16px; padding: 16px 24px;
            font-size: 16px; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-primary:active { transform: scale(0.98); }
        .btn-primary:disabled { background: var(--text-secondary); cursor: not-allowed; }
        .toast {
            position: fixed; bottom: 100px; left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--success); color: white; padding: 14px 24px;
            border-radius: 12px; font-size: 14px; font-weight: 600;
            z-index: 300; opacity: 0; transition: all 0.3s; white-space: nowrap;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .content-padding { padding-bottom: 100px; }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo">Do<span>Jajann</span></div>
            <div class="header-actions">
                <button class="icon-btn" onclick="openMenuModal()" title="Tambah Menu">вЮХ</button>
                <button class="icon-btn cart-btn" onclick="goToCart()">
                    рЯЫТ <span id="cart-total">Rp 0</span>
                    <span class="cart-count" id="cart-count">0</span>
                </button>
            </div>
        </div>
    </header>

    <div class="settings-bar">
        <div class="datetime-row">
            <div class="input-group">
                <label class="input-label">Tanggal</label>
                <input type="date" class="input-field" id="order-date">
            </div>
            <div class="input-group">
                <label class="input-label">Waktu</label>
                <input type="time" class="input-field" id="order-time">
            </div>
        </div>
        <div class="input-group">
            <label class="input-label">Nama Pelanggan</label>
            <input type="text" class="input-field" id="customer-name" placeholder="Opsional...">
        </div>
        <button class="order-type-btn" id="order-type-btn" onclick="openOrderTypeModal()">
            <span id="selected-order-type">рЯНљ Dine In</span>
            <span>вЦЉ</span>
        </button>
    </div>

    <div class="modal-overlay" id="menu-modal-overlay" onclick="closeMenuModal()"></div>
    <div class="modal" id="menu-modal">
        <div class="modal-header">
            <div class="modal-title" id="menu-modal-title">Tambah Menu</div>
            <button class="modal-close" onclick="closeMenuModal()">√Ч</button>
        </div>
        <div class="modal-body">
            <input type="hidden" id="edit-menu-id">
            <div class="form-group">
                <label class="form-label">Ikon</label>
                <div class="emoji-grid" id="emoji-grid"></div>
                <input type="hidden" id="selected-emoji" value="рЯНљпЄП">
            </div>
            <div class="form-group">
                <label class="form-label">Nama Menu</label>
                <input type="text" class="form-input" id="menu-name-input" placeholder="Contoh: Nasi Goreng">
            </div>
            <div class="form-group">
                <label class="form-label">Harga (Rp)</label>
                <input type="number" class="form-input" id="menu-price-input" placeholder="25000" min="0">
            </div>
            <div style="display: flex; gap: 12px; margin-top: 8px;">
                <button class="btn-submit" onclick="saveMenu()" style="margin-top: 0;">Simpan Menu</button>
                <button class="btn-submit" id="delete-menu-modal-btn" onclick="deleteMenuFromModal()" style="margin-top: 0; background: var(--danger); display: none;">Hapus Menu</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="order-modal-overlay" onclick="closeOrderTypeModal()"></div>
    <div class="modal" id="order-type-modal">
        <div class="modal-header">
            <div class="modal-title">Tipe Order</div>
            <button class="modal-close" onclick="closeOrderTypeModal()">√Ч</button>
        </div>
        <div class="modal-body">
            <div class="order-option selected" onclick="selectOrderType('Dine In', 'рЯНљпЄП')">
                <div class="order-option-icon">рЯНљпЄП</div>
                <div class="order-option-text">
                    <div class="order-option-title">Dine In</div>
                    <div class="order-option-desc">Makan di tempat</div>
                </div>
            </div>
            <div class="order-option" onclick="selectOrderType('Take Away', 'рЯЫНпЄП')">
                <div class="order-option-icon">рЯЫНпЄП</div>
                <div class="order-option-text">
                    <div class="order-option-title">Take Away</div>
                    <div class="order-option-desc">Bawa pulang</div>
                </div>
            </div>
            <div class="order-option" onclick="selectOrderType('Ojol', 'рЯЫµ')">
                <div class="order-option-icon">рЯЫµ</div>
                <div class="order-option-text">
                    <div class="order-option-title">Ojol</div>
                    <div class="order-option-desc">Pesan antar</div>
                </div>
            </div>
        </div>
    </div>

    <div class="content-padding">
        <div class="section-title">
            <span>рЯН± Menu</span>
            <button class="add-menu-btn" onclick="openMenuModal()">+ Tambah</button>
        </div>
        <div class="menu-grid" id="menu-grid"></div>
    </div>

    <div class="bottom-bar">
        <button class="btn-primary" id="checkout-btn" onclick="goToCart()">
            Lanjut ke Pembayaran вЖТ
        </button>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // Default menu items
        const defaultMenuItems = [
            { id: 1, name: 'Nasi Goreng Spesial', price: 25000, emoji: 'рЯНЫ' },
            { id: 2, name: 'Mie Ayam Bakso', price: 22000, emoji: 'рЯНЬ' },
            { id: 3, name: 'Ayam Goreng Crispy', price: 28000, emoji: 'рЯНЧ' },
            { id: 4, name: 'Sate Ayam 10 Tusuk', price: 30000, emoji: 'рЯНҐ' },
            { id: 5, name: 'Nasi Padang Rendang', price: 35000, emoji: 'рЯ•Ш' },
            { id: 6, name: 'Gado-Gado', price: 20000, emoji: 'рЯ•Ч' },
            { id: 7, name: 'Soto Ayam', price: 23000, emoji: 'рЯН≤' },
            { id: 8, name: 'Bakso Urat', price: 24000, emoji: 'рЯНЬ' },
            { id: 9, name: 'Es Teh Manis', price: 5000, emoji: 'рЯНє' },
            { id: 10, name: 'Es Jeruk', price: 7000, emoji: 'рЯНК' },
            { id: 11, name: 'Kopi Hitam', price: 8000, emoji: 'вШХ' },
            { id: 12, name: 'Air Mineral', price: 4000, emoji: 'рЯТІ' }
        ];

        // Food emojis for picker
        const foodEmojis = ['рЯНЫ','рЯНЬ','рЯНЧ','рЯНҐ','рЯ•Ш','рЯ•Ч','рЯН≤','рЯНЭ','рЯНХ','рЯНФ','рЯНЯ','рЯМ≠','рЯ•™','рЯМЃ','рЯМѓ','рЯ•Щ','рЯ•Ъ','рЯН≥','рЯ•Ш','рЯН≤','рЯ•£','рЯ•Ч','рЯНњ','рЯІИ','рЯ•Ђ','рЯНЦ','рЯНЧ','рЯ•©','рЯН†','рЯ•Я','рЯ•†','рЯ•°','рЯН±','рЯНШ','рЯНЩ','рЯНЪ','рЯНЫ','рЯНЬ','рЯНЭ','рЯН†','рЯНҐ','рЯН£','рЯН§','рЯН•','рЯН°','рЯН¶','рЯНІ','рЯН®','рЯН©','рЯН™','рЯОВ','рЯН∞','рЯІБ','рЯ•І','рЯНЂ','рЯНђ','рЯН≠','рЯНЃ','рЯНѓ','рЯНЉ','рЯ•Ы','вШХ','рЯНµ','рЯНґ','рЯНЊ','рЯНЈ','рЯНЄ','рЯНє','рЯНЇ','рЯНї','рЯ•В','рЯ•Г','рЯ•§','рЯІГ','рЯІЙ','рЯІК','рЯ•Ґ','рЯНљпЄП','рЯНі','рЯ•Д','рЯФ™','рЯПЇ'];

        let menuItems = [];
        let cart = {};
        let orderType = 'Dine In';
        let orderTypeEmoji = 'рЯНљпЄП';
        let selectedEmoji = 'рЯНљпЄП';

        document.addEventListener('DOMContentLoaded', () => {
            loadMenuItems();
            renderEmojiGrid();
            renderMenu();
            setCurrentDateTime();
            loadCartFromStorage();
        });

        function loadMenuItems() {
            const saved = localStorage.getItem('dojajann_menu_items');
            if (saved) {
                menuItems = JSON.parse(saved);
            } else {
                menuItems = [...defaultMenuItems];
                saveMenuItems();
            }
        }

        function saveMenuItems() {
            localStorage.setItem('dojajann_menu_items', JSON.stringify(menuItems));
        }

        function renderEmojiGrid() {
            const grid = document.getElementById('emoji-grid');
            grid.innerHTML = foodEmojis.map(emoji => `
                <button class="emoji-btn ${emoji === selectedEmoji ? 'selected' : ''}" 
                        onclick="selectEmoji('${emoji}')">${emoji}</button>
            `).join('');
        }

        function selectEmoji(emoji) {
            selectedEmoji = emoji;
            document.getElementById('selected-emoji').value = emoji;
            renderEmojiGrid();
        }

        function openMenuModal(editId = null) {
            document.getElementById('menu-modal-overlay').classList.add('show');
            document.getElementById('menu-modal').classList.add('show');
            
            const deleteModalBtn = document.getElementById('delete-menu-modal-btn');

            if (editId) {
                const item = menuItems.find(i => i.id === editId);
                document.getElementById('menu-modal-title').textContent = 'Edit Menu';
                document.getElementById('edit-menu-id').value = editId;
                document.getElementById('menu-name-input').value = item.name;
                document.getElementById('menu-price-input').value = item.price;
                selectEmoji(item.emoji);
                deleteModalBtn.style.display = 'block'; // Munculin tombol hapus di Modal
            } else {
                document.getElementById('menu-modal-title').textContent = 'Tambah Menu';
                document.getElementById('edit-menu-id').value = '';
                document.getElementById('menu-name-input').value = '';
                document.getElementById('menu-price-input').value = '';
                selectEmoji('рЯНљпЄП');
                deleteModalBtn.style.display = 'none'; // Sembunyiin tombol hapus pas nambah baru
            }
        }

        function closeMenuModal() {
            document.getElementById('menu-modal-overlay').classList.remove('show');
            document.getElementById('menu-modal').classList.remove('show');
        }

        function saveMenu() {
            const id = document.getElementById('edit-menu-id').value;
            const name = document.getElementById('menu-name-input').value.trim();
            const price = parseInt(document.getElementById('menu-price-input').value) || 0;
            const emoji = document.getElementById('selected-emoji').value;

            if (!name || price <= 0) {
                showToast('вЭМ Nama dan harga wajib diisi!');
                return;
            }

            if (id) {
                // Edit existing
                const index = menuItems.findIndex(i => i.id === parseInt(id));
                if (index !== -1) {
                    menuItems[index] = { ...menuItems[index], name, price, emoji };
                    showToast('вЬЕ Menu diperbarui!');
                }
            } else {
                // Add new
                const newId = Math.max(...menuItems.map(i => i.id), 0) + 1;
                menuItems.push({ id: newId, name, price, emoji });
                showToast('вЬЕ Menu ditambahkan!');
            }

            saveMenuItems();
            renderMenu();
            closeMenuModal();
        }

        // FUNGSI BARU: Buat hapus dari dalem Modal Custom Menu
        function deleteMenuFromModal() {
            const id = parseInt(document.getElementById('edit-menu-id').value);
            if (id && confirm('Yakin mau hapus menu ini bro?')) {
                menuItems = menuItems.filter(i => i.id !== id);
                delete cart[id];
                saveMenuItems();
                renderMenu();
                updateCartUI();
                closeMenuModal();
                showToast('рЯЧСпЄП Menu berhasil dihapus');
            }
        }

        function deleteMenuItem(id, event) {
            event.stopPropagation();
            if (confirm('Hapus menu ini?')) {
                menuItems = menuItems.filter(i => i.id !== id);
                delete cart[id];
                saveMenuItems();
                renderMenu();
                updateCartUI();
                showToast('рЯЧСпЄП Menu dihapus');
            }
        }

        function editMenuItem(id, event) {
            event.stopPropagation();
            openMenuModal(id);
        }

        function setCurrentDateTime() {
            const now = new Date();
            document.getElementById('order-date').value = now.toISOString().split('T')[0];
            document.getElementById('order-time').value = now.toTimeString().slice(0, 5);
        }

        function renderMenu() {
            const grid = document.getElementById('menu-grid');
            grid.innerHTML = menuItems.map(item => `
                <div class="menu-card ${cart[item.id] ? 'in-cart' : ''}" onclick="addToCart(${item.id})">
                    <div class="menu-actions">
                        <button class="menu-action-btn edit-btn" onclick="editMenuItem(${item.id}, event)">вЬПпЄП</button>
                        <button class="menu-action-btn delete-btn" onclick="deleteMenuItem(${item.id}, event)">рЯЧСпЄП</button>
                    </div>
                    <span class="menu-emoji">${item.emoji}</span>
                    <div class="menu-name">${item.name}</div>
                    <div class="menu-price">Rp ${formatPrice(item.price)}</div>
                    <div class="menu-qty-badge ${cart[item.id] ? 'show' : ''}" id="badge-${item.id}">
                        ${cart[item.id]?.qty || 0}
                    </div>
                </div>
            `).join('');
        }

        function addToCart(itemId) {
            const item = menuItems.find(i => i.id === itemId);
            if (!item) return;
            
            if (!cart[itemId]) {
                cart[itemId] = { ...item, qty: 1 };
            } else {
                cart[itemId].qty++;
            }
            updateCartUI();
            saveCartToStorage();
            showToast(`вЬЕ ${item.name} ditambahkan!`);
        }

        function updateCartUI() {
            const total = Object.values(cart).reduce((sum, item) => sum + (item.price * item.qty), 0);
            const count = Object.values(cart).reduce((sum, item) => sum + item.qty, 0);
            
            document.getElementById('cart-total').textContent = `Rp ${formatPrice(total)}`;
            document.getElementById('cart-count').textContent = count;
            document.getElementById('cart-count').style.display = count > 0 ? 'flex' : 'none';
            
            menuItems.forEach(item => {
                const badge = document.getElementById(`badge-${item.id}`);
                if (badge) {
                    if (cart[item.id]) {
                        badge.textContent = cart[item.id].qty;
                        badge.classList.add('show');
                        badge.parentElement.classList.add('in-cart');
                    } else {
                        badge.classList.remove('show');
                        badge.parentElement.classList.remove('in-cart');
                    }
                }
            });

            document.getElementById('checkout-btn').disabled = count === 0;
        }

        function openOrderTypeModal() {
            document.getElementById('order-modal-overlay').classList.add('show');
            document.getElementById('order-type-modal').classList.add('show');
        }

        function closeOrderTypeModal() {
            document.getElementById('order-modal-overlay').classList.remove('show');
            document.getElementById('order-type-modal').classList.remove('show');
        }

        function selectOrderType(type, emoji) {
            orderType = type;
            orderTypeEmoji = emoji;
            document.getElementById('selected-order-type').textContent = `${emoji} ${type}`;
            
            document.querySelectorAll('.order-option').forEach(opt => opt.classList.remove('selected'));
            event.currentTarget.classList.add('selected');
            
            saveOrderSettings();
            closeOrderTypeModal();
        }

        function formatPrice(price) {
            return price.toLocaleString('id-ID');
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function saveCartToStorage() {
            localStorage.setItem('dojajann_cart', JSON.stringify(cart));
            saveOrderSettings();
        }

        function saveOrderSettings() {
            const settings = {
                date: document.getElementById('order-date').value,
                time: document.getElementById('order-time').value,
                customer: document.getElementById('customer-name').value,
                orderType: orderType,
                orderTypeEmoji: orderTypeEmoji
            };
            localStorage.setItem('dojajann_settings', JSON.stringify(settings));
        }

        function loadCartFromStorage() {
            const savedCart = localStorage.getItem('dojajann_cart');
            const savedSettings = localStorage.getItem('dojajann_settings');
            
            if (savedCart) cart = JSON.parse(savedCart);
            if (savedSettings) {
                const settings = JSON.parse(savedSettings);
                document.getElementById('order-date').value = settings.date || '';
                document.getElementById('order-time').value = settings.time || '';
                document.getElementById('customer-name').value = settings.customer || '';
                orderType = settings.orderType || 'Dine In';
                orderTypeEmoji = settings.orderTypeEmoji || 'рЯНљпЄП';
                document.getElementById('selected-order-type').textContent = `${orderTypeEmoji} ${orderType}`;
            }
            
            updateCartUI();
        }

        function goToCart() {
            if (Object.keys(cart).length === 0) {
                showToast('вЪ†пЄП Keranjang masih kosong!');
                return;
            }
            saveOrderSettings();
            window.location.href = 'cart.html';
        }

        document.getElementById('order-date').addEventListener('change', saveOrderSettings);
        document.getElementById('order-time').addEventListener('change', saveOrderSettings);
        document.getElementById('customer-name').addEventListener('input', saveOrderSettings);
    </script>
</body>
</html>
