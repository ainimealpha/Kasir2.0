<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DoJajann - Review Pesanan</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0a0a; --surface: #141414; --surface-elevated: #1a1a1a;
            --border: #2a2a2a; --orange: #ff6b35; --text: #ffffff;
            --text-secondary: #a0a0a0; --success: #22c55e; --danger: #ef4444;
        }
        body {
            font-family: 'Inter', sans-serif; background: var(--bg);
            color: var(--text); min-height: 100vh;
        }
        .header {
            background: var(--surface); border-bottom: 1px solid var(--border);
            padding: 16px 20px; position: sticky; top: 0; z-index: 100;
        }
        .header-content {
            display: flex; align-items: center; gap: 16px;
        }
        .back-btn {
            background: var(--surface-elevated); border: 1px solid var(--border);
            color: var(--text); width: 40px; height: 40px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 20px;
        }
        .header-title { font-size: 18px; font-weight: 700; }
        
        .order-info {
            background: var(--surface); padding: 16px 20px;
            border-bottom: 1px solid var(--border);
        }
        .info-row {
            display: flex; justify-content: space-between;
            align-items: center; padding: 6px 0; font-size: 14px;
        }
        .info-label { color: var(--text-secondary); }
        .info-value { font-weight: 600; }

        .section-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 20px 20px 12px;
        }
        .section-title {
            font-size: 13px; font-weight: 700; color: var(--text-secondary);
            text-transform: uppercase; letter-spacing: 0.5px;
        }
        .clear-btn {
            background: transparent; border: none; color: var(--danger);
            font-size: 13px; font-weight: 600; cursor: pointer;
        }

        .cart-items { padding: 0 20px; }
        .cart-item {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 16px; padding: 16px; margin-bottom: 12px;
            display: flex; gap: 14px; align-items: center;
        }
        .item-emoji {
            width: 52px; height: 52px; background: var(--surface-elevated);
            border-radius: 14px; display: flex; align-items: center;
            justify-content: center; font-size: 28px; flex-shrink: 0;
        }
        .item-details { flex: 1; min-width: 0; }
        .item-name {
            font-size: 15px; font-weight: 600; margin-bottom: 4px;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .item-price { font-size: 14px; color: var(--orange); font-weight: 600; }
        .item-subtotal {
            font-size: 12px; color: var(--text-secondary); margin-top: 2px;
        }
        .item-actions {
            display: flex; flex-direction: column; align-items: flex-end; gap: 10px;
        }
        .qty-control {
            display: flex; align-items: center; gap: 10px;
            background: var(--surface-elevated); border-radius: 10px; padding: 4px;
        }
        .qty-btn {
            width: 32px; height: 32px; border-radius: 8px; border: none;
            background: var(--surface); color: var(--text); font-size: 16px;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
        }
        .qty-btn:active { background: var(--orange); }
        .qty-value { font-size: 15px; font-weight: 700; min-width: 24px; text-align: center; }
        .delete-btn {
            font-size: 12px; color: var(--danger); background: transparent;
            border: none; cursor: pointer; font-weight: 500;
        }

        .discount-section { padding: 0 20px 20px; }
        .discount-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 16px; padding: 16px;
        }
        .discount-header {
            display: flex; gap: 8px; margin-bottom: 12px;
        }
        .discount-type-btn {
            flex: 1; padding: 12px; border-radius: 12px;
            border: 1px solid var(--border); background: var(--surface-elevated);
            color: var(--text); font-size: 14px; font-weight: 600; cursor: pointer;
        }
        .discount-type-btn.active { background: var(--orange); border-color: var(--orange); }
        .discount-input-wrapper {
            display: flex; align-items: center; gap: 12px;
            background: var(--surface-elevated); border-radius: 12px;
            padding: 4px 4px 4px 16px; border: 1px solid var(--border);
        }
        .discount-input-wrapper:focus-within { border-color: var(--orange); }
        .discount-input {
            flex: 1; background: transparent; border: none; color: var(--text);
            font-size: 16px; outline: none; padding: 10px 0;
        }
        .discount-prefix { color: var(--text-secondary); font-weight: 600; }

        .summary-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 16px; padding: 20px; margin: 0 20px 20px;
        }
        .summary-row {
            display: flex; justify-content: space-between;
            align-items: center; padding: 8px 0; font-size: 15px;
        }
        .summary-row.discount { color: var(--success); }
        .summary-row.total {
            font-size: 20px; font-weight: 700;
            padding-top: 16px; margin-top: 8px;
            border-top: 2px solid var(--border);
        }
        .summary-row.total .amount { color: var(--orange); }

        .bottom-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--surface); border-top: 1px solid var(--border);
            padding: 16px 20px; padding-bottom: calc(16px + env(safe-area-inset-bottom));
            display: flex; gap: 12px;
        }
        .btn {
            flex: 1; border: none; border-radius: 16px; padding: 16px 24px;
            font-size: 16px; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-secondary {
            background: var(--surface-elevated); color: var(--text);
            border: 1px solid var(--border); flex: 0.4;
        }
        .btn-primary { background: var(--orange); color: white; flex: 0.6; }
        .btn-primary:disabled { background: var(--text-secondary); cursor: not-allowed; }

        .empty-state {
            text-align: center; padding: 80px 20px; color: var(--text-secondary);
        }
        .empty-icon { font-size: 64px; margin-bottom: 16px; }
        .empty-text { font-size: 16px; margin-bottom: 24px; }

        .toast {
            position: fixed; bottom: 100px; left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--success); color: white; padding: 14px 24px;
            border-radius: 12px; font-size: 14px; font-weight: 600;
            z-index: 300; opacity: 0; transition: all 0.3s;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .content-padding { padding-bottom: 100px; }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <button class="back-btn" onclick="goBack()">←</button>
            <div class="header-title">Review Pesanan</div>
        </div>
    </header>

    <div class="order-info" id="order-info">
        <div class="info-row">
            <span class="info-label">Tipe Order</span>
            <span class="info-value" id="info-type">-</span>
        </div>
        <div class="info-row">
            <span class="info-label">Tanggal & Waktu</span>
            <span class="info-value" id="info-datetime">-</span>
        </div>
        <div class="info-row" id="info-customer-row" style="display: none;">
            <span class="info-label">Pelanggan</span>
            <span class="info-value" id="info-customer">-</span>
        </div>
    </div>

    <div class="section-header">
        <span class="section-title">🛒 Detail Pesanan</span>
        <button class="clear-btn" onclick="clearCart()">Kosongkan</button>
    </div>

    <div class="cart-items" id="cart-items"></div>

    <div class="empty-state" id="empty-state" style="display: none;">
        <div class="empty-icon">🛒</div>
        <div class="empty-text">Keranjang masih kosong</div>
        <button class="btn btn-primary" onclick="goBack()" style="max-width: 200px;">Kembali ke Menu</button>
    </div>

    <div class="content-padding" id="content-area">
        <div class="discount-section">
            <div class="section-header" style="padding-left: 0; padding-right: 0;">
                <span class="section-title">🏷️ Diskon</span>
            </div>
            <div class="discount-card">
                <div class="discount-header">
                    <button class="discount-type-btn active" onclick="setDiscountType('pct')" id="btn-pct">Persen %</button>
                    <button class="discount-type-btn" onclick="setDiscountType('rp')" id="btn-rp">Rupiah Rp</button>
                </div>
                <div class="discount-input-wrapper">
                    <span class="discount-prefix" id="discount-prefix">%</span>
                    <input type="number" class="discount-input" id="discount-input" placeholder="0" min="0" oninput="calculateSummary()">
                </div>
            </div>
        </div>

        <div class="section-header" style="padding-bottom: 12px;">
            <span class="section-title">💰 Ringkasan</span>
        </div>
        <div class="summary-card">
            <div class="summary-row">
                <span>Subtotal</span>
                <span id="summary-subtotal">Rp 0</span>
            </div>
            <div class="summary-row discount" id="discount-row" style="display: none;">
                <span>Diskon</span>
                <span id="summary-discount">- Rp 0</span>
            </div>
            <div class="summary-row total">
                <span>TOTAL BAYAR</span>
                <span class="amount" id="summary-total">Rp 0</span>
            </div>
        </div>
    </div>

    <div class="bottom-bar">
        <button class="btn btn-secondary" onclick="goBack()">←</button>
        <button class="btn btn-primary" onclick="goToReceipt()">Bayar →</button>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let cart = {};
        let settings = {};
        let discountType = 'pct';
        let discountValue = 0;

        document.addEventListener('DOMContentLoaded', () => {
            loadData();
        });

        function loadData() {
            const savedCart = localStorage.getItem('dojajann_cart');
            const savedSettings = localStorage.getItem('dojajann_settings');
            
            if (savedCart) cart = JSON.parse(savedCart);
            if (savedSettings) settings = JSON.parse(savedSettings);
            
            if (Object.keys(cart).length === 0) {
                showEmptyState();
            } else {
                renderOrderInfo();
                renderCartItems();
                calculateSummary();
            }
        }

        function showEmptyState() {
            document.getElementById('cart-items').style.display = 'none';
            document.getElementById('content-area').style.display = 'none';
            document.querySelector('.section-header').style.display = 'none';
            document.querySelector('.bottom-bar').style.display = 'none';
            document.getElementById('empty-state').style.display = 'block';
        }

        function renderOrderInfo() {
            document.getElementById('info-type').textContent = 
                `${settings.orderTypeEmoji || '🍽️'} ${settings.orderType || 'Dine In'}`;
            document.getElementById('info-datetime').textContent = 
                `${settings.date || '-'} ${settings.time || ''}`;
            
            if (settings.customer) {
                document.getElementById('info-customer').textContent = settings.customer;
                document.getElementById('info-customer-row').style.display = 'flex';
            }
        }

        function renderCartItems() {
            const container = document.getElementById('cart-items');
            const items = Object.values(cart);
            
            container.innerHTML = items.map(item => `
                <div class="cart-item">
                    <div class="item-emoji">${item.emoji}</div>
                    <div class="item-details">
                        <div class="item-name">${item.name}</div>
                        <div class="item-price">Rp ${formatPrice(item.price)} x ${item.qty}</div>
                        <div class="item-subtotal">= Rp ${formatPrice(item.price * item.qty)}</div>
                    </div>
                    <div class="item-actions">
                        <div class="qty-control">
                            <button class="qty-btn" onclick="updateQty(${item.id}, -1)">−</button>
                            <span class="qty-value">${item.qty}</span>
                            <button class="qty-btn" onclick="updateQty(${item.id}, 1)">+</button>
                        </div>
                        <button class="delete-btn" onclick="removeItem(${item.id})">Hapus</button>
                    </div>
                </div>
            `).join('');
        }

        function updateQty(itemId, change) {
            if (!cart[itemId]) return;
            
            cart[itemId].qty += change;
            if (cart[itemId].qty <= 0) {
                delete cart[itemId];
            }
            
            saveCart();
            
            if (Object.keys(cart).length === 0) {
                location.reload();
            } else {
                renderCartItems();
                calculateSummary();
            }
        }

        function removeItem(itemId) {
            delete cart[itemId];
            saveCart();
            showToast('🗑️ Item dihapus');
            
            if (Object.keys(cart).length === 0) {
                location.reload();
            } else {
                renderCartItems();
                calculateSummary();
            }
        }

        function clearCart() {
            if (!confirm('Kosongkan semua pesanan?')) return;
            cart = {};
            saveCart();
            location.reload();
        }

        function setDiscountType(type) {
            discountType = type;
            document.getElementById('btn-pct').classList.toggle('active', type === 'pct');
            document.getElementById('btn-rp').classList.toggle('active', type === 'rp');
            document.getElementById('discount-prefix').textContent = type === 'pct' ? '%' : 'Rp';
            document.getElementById('discount-input').placeholder = '0';
            document.getElementById('discount-input').value = '';
            calculateSummary();
        }

        function calculateSummary() {
            const subtotal = Object.values(cart).reduce((sum, item) => 
                sum + (item.price * item.qty), 0);
            discountValue = parseFloat(document.getElementById('discount-input').value) || 0;
            
            let discountAmount = 0;
            if (discountType === 'pct') {
                discountAmount = Math.round(subtotal * (discountValue / 100));
            } else {
                discountAmount = discountValue;
            }
            
            discountAmount = Math.min(discountAmount, subtotal);
            const total = subtotal - discountAmount;
            
            document.getElementById('summary-subtotal').textContent = `Rp ${formatPrice(subtotal)}`;
            
            const discountRow = document.getElementById('discount-row');
            if (discountAmount > 0) {
                discountRow.style.display = 'flex';
                document.getElementById('summary-discount').textContent = 
                    `- Rp ${formatPrice(discountAmount)}`;
            } else {
                discountRow.style.display = 'none';
            }
            
            document.getElementById('summary-total').textContent = `Rp ${formatPrice(total)}`;
            
            localStorage.setItem('dojajann_summary', JSON.stringify({
                subtotal, discount: discountAmount, total, discountType, discountValue
            }));
        }

        function formatPrice(price) {
            return price.toLocaleString('id-ID');
        }

        function saveCart() {
            localStorage.setItem('dojajann_cart', JSON.stringify(cart));
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function goBack() {
            window.location.href = 'index.html';
        }

        function goToReceipt() {
            window.location.href = 'receipt.html';
        }
    </script>
</body>
</html>
